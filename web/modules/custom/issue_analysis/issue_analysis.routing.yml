issue_analysis.daily_digest_cron:
  path: '/issue-analysis/cron'
  defaults:
    _controller: '\Drupal\issue_analysis\Controller\DailyDigestCronController::run'
  requirements:
    _access: 'TRUE'
  options:
    no_cache: TRUE

issue_analysis.daily_digest_admin:
  path: '/admin/config/services/issue-analysis/daily-digest'
  defaults:
    _form: '\Drupal\issue_analysis\Form\DailyDigestForm'
    _title: 'Daily Newsletter Digest'
  requirements:
    _permission: 'generate issue analysis newsletter'

issue_analysis.mailchimp_settings:
  path: '/admin/config/services/issue-analysis/mailchimp-settings'
  defaults:
    _form: '\Drupal\issue_analysis\Form\MailchimpSettingsForm'
    _title: 'Mailchimp Campaign Settings'
  requirements:
    _permission: 'generate issue analysis newsletter'

issue_analysis.newsletter_signup:
  path: '/newsletter/signup'
  defaults:
    _controller: '\Drupal\issue_analysis\Controller\NewsletterSignupController::page'
    _title: 'Daily Digest Signup'
  requirements:
    _access: 'TRUE'

issue_analysis.daily_digest_view:
  path: '/ai-dashboard/daily-digest/{node}'
  defaults:
    _controller: '\Drupal\issue_analysis\Controller\DailyDigestViewController::view'
    _title: 'Daily Digest'
  requirements:
    _permission: 'access content'
    node: \d+
